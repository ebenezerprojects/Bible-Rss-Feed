  # ==================== USER MANAGEMENT (ADMIN ONLY) ====================
  /user/create:
    post:
      summary: Create new user
      description: Create a new user account (Admin only)
      tags: [User Management]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - password
              properties:
                user_id:
                  type: string
                  minLength: 3
                  maxLength: 50
                password:
                  type: string
                  minLength: 4
                email:
                  type: string
                  format: email
                full_name:
                  type: string
                role_code:
                  type: string
                  enum: [admin, user, viewer, editor]
                  default: user
      responses:
        200:
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
        400:
          description: Validation error or user already exists
        403:
          description: Admin access required

  /user/assign-formats:
    post:
      summary: Assign formats to user
      description: Assign format permissions to a user (Admin only)
      tags: [User Management]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - format_codes
              properties:
                user_id:
                  type: string
                format_codes:
                  type: array
                  items:
                    type: string
                    enum: [RSS_VERSE, RSS_REFERENCE, XML_BIBLESHOW, JSON_BIBLE, TXT_VERSE]
      responses:
        200:
          description: Formats assigned
        400:
          description: Invalid request
        403:
          description: Admin access required
        404:
          description: User not found

  /user/assign-versions:
    post:
      summary: Assign Bible versions to user
      description: Assign Bible version access to a user (Admin only)
      tags: [User Management]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - version_codes
              properties:
                user_id:
                  type: string
                version_codes:
                  type: array
                  items:
                    type: string
                    enum: [KJV, TAM]
                default_version:
                  type: string
      responses:
        200:
          description: Versions assigned
        400:
          description: Invalid request
        403:
          description: Admin access required
        404:
          description: User not found

  /user/create-full:
    post:
      summary: Create user with formats and versions
      description: Create a new user with formats and versions assigned (Admin only)
      tags: [User Management]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - password
              properties:
                user_id:
                  type: string
                password:
                  type: string
                email:
                  type: string
                full_name:
                  type: string
                role_code:
                  type: string
                  enum: [admin, user, viewer, editor]
                format_codes:
                  type: array
                  items:
                    type: string
                version_codes:
                  type: array
                  items:
                    type: string
                default_version:
                  type: string
      responses:
        200:
          description: User created with assignments
        400:
          description: Invalid request
        403:
          description: Admin access required

  /user/formats/list:
    get:
