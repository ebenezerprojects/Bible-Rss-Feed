<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feeds - Bible API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" id="brandLink"><i class="fas fa-bible me-2"></i>Bible API</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i><span id="userName">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <h6 class="sidebar-heading px-3 mt-4 mb-1 text-muted">Bible</h6>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="/src/bible/verse-finder.html"><i class="fas fa-book-open me-2"></i>Verse Finder</a></li>
                        <li class="nav-item"><a class="nav-link" href="/src/bible/word-search.html"><i class="fas fa-search me-2"></i>Word Search</a></li>
                    </ul>
                    <h6 class="sidebar-heading px-3 mt-4 mb-1 text-muted">Feeds & Formats</h6>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="/src/feeds/rss-feeds.html"><i class="fas fa-rss me-2"></i>RSS Feeds</a></li>
                        <li class="nav-item"><a class="nav-link" href="/src/feeds/xml-format.html"><i class="fas fa-code me-2"></i>XML Format</a></li>
                        <li class="nav-item"><a class="nav-link" href="/src/feeds/text-files.html"><i class="fas fa-file-alt me-2"></i>Text Files</a></li>
                        <li class="nav-item"><a class="nav-link" href="/src/feeds/file-locations.html"><i class="fas fa-folder-open me-2"></i>File Locations</a></li>
                    </ul>
                    <div id="adminMenu" style="display:none;">
                        <h6 class="sidebar-heading px-3 mt-4 mb-1 text-muted">Administration</h6>
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="/src/admin/user-management.html"><i class="fas fa-users me-2"></i>User Management</a></li>
                            <li class="nav-item"><a class="nav-link" href="/src/admin/backup.html"><i class="fas fa-database me-2"></i>Backup</a></li>
                            <li class="nav-item"><a class="nav-link" href="/src/admin/statistics.html"><i class="fas fa-chart-line me-2"></i>Statistics</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="pt-3 pb-2 mb-3 border-bottom"><h1 class="h2"><i class="fas fa-rss me-2"></i>RSS Feeds</h1></div>
                <div class="card"><div class="card-header"><i class="fas fa-rss me-2"></i>Your RSS Feed URLs</div><div class="card-body" id="rssFeedsContent"><div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Loading your feeds...</p></div></div></div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!checkAuth()) return;
            const user = getCurrentUser();
            document.getElementById('userName').textContent = user.full_name || user.user_id;
            document.getElementById('brandLink').href = user.role === 'admin' ? '/src/admin/dashboard.html' : '/src/admin/dashboard.html';
            if (user.role === 'admin') document.getElementById('adminMenu').style.display = 'block';
            
            const versions = getUserVersions();
            const contentDiv = document.getElementById('rssFeedsContent');
            if (versions.length === 0) { contentDiv.innerHTML = '<div class="alert alert-warning">No Bible versions assigned to you.</div>'; return; }
            contentDiv.innerHTML = versions.map(v => `<div class="mb-4"><h5><i class="fas fa-book me-2"></i>${v}</h5><div class="list-group"><a href="${API_URL}/rss/${user.user_id}/${v.toLowerCase()}/verse" class="list-group-item list-group-item-action" target="_blank"><i class="fas fa-rss-square text-warning me-2"></i>Verse Feed - ${API_URL}/rss/${user.user_id}/${v.toLowerCase()}/verse</a><a href="${API_URL}/rss/${user.user_id}/${v.toLowerCase()}/reference" class="list-group-item list-group-item-action" target="_blank"><i class="fas fa-rss-square text-warning me-2"></i>Reference Feed - ${API_URL}/rss/${user.user_id}/${v.toLowerCase()}/reference</a></div></div>`).join('');
        });
    </script>
</body>
</html>
